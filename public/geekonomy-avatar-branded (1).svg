<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions with Geekonomy brand colors -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#434343;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#69AE44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9437;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7BC84F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#69AE44;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#545454;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#434343;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filters for glow effects -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)"/>
  
  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#glowGrad)" stroke-width="2" opacity="0.4" filter="url(#glow)">
    <animate attributeName="r" values="180;185;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Circuit pattern background -->
  <g opacity="0.15" stroke="#69AE44" stroke-width="1" fill="none">
    <path d="M 80 100 L 120 100 L 120 140 M 120 120 L 160 120"/>
    <path d="M 240 80 L 280 80 L 280 120 M 280 100 L 320 100"/>
    <path d="M 100 280 L 140 280 L 140 320 M 140 300 L 180 300"/>
    <path d="M 260 260 L 300 260 L 300 300 M 300 280 L 340 280"/>
    <circle cx="120" cy="100" r="3"/>
    <circle cx="160" cy="120" r="3"/>
    <circle cx="280" cy="80" r="3"/>
    <circle cx="320" cy="100" r="3"/>
    <circle cx="140" cy="280" r="3"/>
    <circle cx="180" cy="300" r="3"/>
    <circle cx="300" cy="260" r="3"/>
    <circle cx="340" cy="280" r="3"/>
  </g>
  
  <!-- Character head/helmet base -->
  <ellipse cx="200" cy="180" rx="75" ry="85" fill="url(#faceGrad)"/>
  
  <!-- Helmet visor -->
  <g filter="url(#glow)">
    <path d="M 140 160 Q 200 155 260 160 L 260 200 Q 200 205 140 200 Z" 
          fill="url(#glowGrad)" opacity="0.9"/>
    
    <!-- Visor scan line animation -->
    <rect x="140" y="160" width="120" height="2" fill="#7BC84F" opacity="0.8">
      <animate attributeName="y" values="160;200;160" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Visor reflection -->
  <ellipse cx="170" cy="175" rx="15" ry="10" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="230" cy="175" rx="12" ry="8" fill="#ffffff" opacity="0.25"/>
  
  <!-- Digital eye indicators -->
  <circle cx="170" cy="180" r="8" fill="#7BC84F" opacity="0.6" filter="url(#innerGlow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="180" r="8" fill="#7BC84F" opacity="0.6" filter="url(#innerGlow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Helmet details -->
  <path d="M 140 160 L 135 145 Q 200 135 265 145 L 260 160" 
        fill="none" stroke="#69AE44" stroke-width="2"/>
  
  <!-- Side tech panels -->
  <rect x="125" y="175" width="8" height="20" fill="url(#accentGrad)" rx="1"/>
  <rect x="267" y="175" width="8" height="20" fill="url(#accentGrad)" rx="1"/>
  
  <!-- Panel detail lines -->
  <line x1="127" y1="180" x2="127" y2="190" stroke="#7BC84F" stroke-width="1" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="271" y1="180" x2="271" y2="190" stroke="#7BC84F" stroke-width="1" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite"/>
  </line>
  
  <!-- Neck/collar -->
  <path d="M 160 245 L 160 270 L 180 285 L 220 285 L 240 270 L 240 245" 
        fill="url(#darkGrad)" stroke="#69AE44" stroke-width="1.5"/>
  
  <!-- Shoulder armor pieces -->
  <path d="M 140 270 L 120 280 L 130 310 L 160 295 Z" 
        fill="url(#faceGrad)" stroke="#69AE44" stroke-width="1.5"/>
  <path d="M 260 270 L 280 280 L 270 310 L 240 295 Z" 
        fill="url(#faceGrad)" stroke="#69AE44" stroke-width="1.5"/>
  
  <!-- Chest piece -->
  <path d="M 160 285 L 150 295 L 150 340 L 200 355 L 250 340 L 250 295 L 240 285 Z" 
        fill="url(#darkGrad)" stroke="#69AE44" stroke-width="2"/>
  
  <!-- Central power core -->
  <circle cx="200" cy="315" r="18" fill="none" stroke="#69AE44" stroke-width="2" filter="url(#glow)">
    <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="315" r="12" fill="url(#glowGrad)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="315" r="6" fill="#7BC84F" opacity="0.9"/>
  
  <!-- Tech detail lines on chest -->
  <line x1="200" y1="290" x2="200" y2="295" stroke="#69AE44" stroke-width="1.5"/>
  <line x1="200" y1="335" x2="200" y2="345" stroke="#69AE44" stroke-width="1.5"/>
  
  <!-- Hexagonal details on chest -->
  <g opacity="0.3" stroke="#69AE44" stroke-width="1" fill="none">
    <path d="M 175 305 L 180 302 L 185 305 L 185 310 L 180 313 L 175 310 Z"/>
    <path d="M 215 305 L 220 302 L 225 305 L 225 310 L 220 313 L 215 310 Z"/>
    <path d="M 175 325 L 180 322 L 185 325 L 185 330 L 180 333 L 175 330 Z"/>
    <path d="M 215 325 L 220 322 L 225 325 L 225 330 L 220 333 L 215 330 Z"/>
  </g>
  
  <!-- Data stream particles -->
  <g opacity="0.6">
    <circle cx="185" cy="305" r="2" fill="#69AE44">
      <animate attributeName="cy" values="305;285;305" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="215" cy="310" r="2" fill="#7BC84F">
      <animate attributeName="cy" values="310;290;310" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="325" r="2" fill="#69AE44">
      <animate attributeName="cy" values="325;345;325" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="320" r="2" fill="#7BC84F">
      <animate attributeName="cy" values="320;340;320" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Corner tech accents -->
  <g opacity="0.4" stroke="#69AE44" stroke-width="1.5" fill="none">
    <path d="M 30 30 L 50 30 L 50 50"/>
    <path d="M 370 30 L 350 30 L 350 50"/>
    <path d="M 30 370 L 50 370 L 50 350"/>
    <path d="M 370 370 L 350 370 L 350 350"/>
  </g>
  
  <!-- Glowing particles around avatar -->
  <circle cx="100" cy="120" r="2" fill="#69AE44" opacity="0.5">
    <animate attributeName="cy" values="120;100;120" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="150" r="2" fill="#7BC84F" opacity="0.5">
    <animate attributeName="cy" values="150;130;150" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="280" r="2" fill="#69AE44" opacity="0.5">
    <animate attributeName="cy" values="280;260;280" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="300" r="2" fill="#7BC84F" opacity="0.5">
    <animate attributeName="cy" values="300;280;300" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Additional geometric accents -->
  <g opacity="0.2" stroke="#69AE44" stroke-width="1" fill="none">
    <circle cx="200" cy="200" r="140"/>
    <circle cx="200" cy="200" r="160"/>
  </g>
</svg>